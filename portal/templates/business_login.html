<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiribot — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5fa; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px;
            box-shadow: 0 4px 32px rgba(0,0,0,.08); }
    .logo { font-size: 24px; font-weight: 700; color: #6366f1; text-align: center; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #6b7280; font-size: 13px; margin-bottom: 28px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 4px; }
    input { width: 100%; padding: 10px 14px; border: 1.5px solid #e5e7eb;
            border-radius: 8px; font-size: 14px; outline: none;
            transition: border-color .15s; margin-bottom: 16px; }
    input:focus { border-color: #6366f1; }
    button[type="submit"] {
      width: 100%; padding: 11px; background: #6366f1; color: white;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button[type="submit"]:hover { background: #4f46e5; }
    .signup-link { text-align: center; margin-top: 18px; font-size: 13px; color: #6b7280; }
    .signup-link a { color: #6366f1; text-decoration: none; font-weight: 500; }
    .error { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c;
             border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Quiribot 🛍</div>
    <div class="subtitle">Merchant Portal</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST" action="/business/login">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required autocomplete="email" />
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" />
      <button type="submit">Sign In</button>
    </form>
    <p class="signup-link">Don't have an account? <a href="/business/signup">Create one</a></p>
  </div>
</body>
</html>
