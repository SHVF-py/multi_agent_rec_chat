<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiribot — Create Account</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5fa; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px;
            box-shadow: 0 4px 32px rgba(0,0,0,.08); }
    .logo { font-size: 24px; font-weight: 700; color: #6366f1; text-align: center; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #6b7280; font-size: 13px; margin-bottom: 28px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 4px; }
    input { width: 100%; padding: 10px 14px; border: 1.5px solid #e5e7eb;
            border-radius: 8px; font-size: 14px; outline: none;
            transition: border-color .15s; margin-bottom: 16px; }
    input:focus { border-color: #6366f1; }
    button[type="submit"] {
      width: 100%; padding: 11px; background: #6366f1; color: white;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; margin-top: 4px; }
    button[type="submit"]:hover { background: #4f46e5; }
    .login-link { text-align: center; margin-top: 18px; font-size: 13px; color: #6b7280; }
    .login-link a { color: #6366f1; text-decoration: none; font-weight: 500; }
    .error { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c;
             border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }
    .note { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534;
            border-radius: 8px; padding: 10px 14px; font-size: 12px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Quiribot 🛍</div>
    <div class="subtitle">Add AI product search to your store</div>
    <div class="note">After signup, your account will be reviewed and approved within 24 hours.</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST" action="/business/signup">
      <label for="name">Business Name</label>
      <input type="text" id="name" name="name" required placeholder="My Awesome Store" value="{{ name or '' }}" />
      <label for="website_url">Store URL</label>
      <input type="url" id="website_url" name="website_url" required placeholder="https://mystore.com" value="{{ website_url or '' }}" />
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required placeholder="you@mystore.com" value="{{ email or '' }}" />
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required placeholder="Min. 8 characters" />
      <button type="submit">Create Account</button>
    </form>
    <p class="login-link">Already have an account? <a href="/business/login">Sign in</a></p>
  </div>
</body>
</html>
