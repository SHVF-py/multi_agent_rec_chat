<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiribot — Owner Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0a0a0f; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; }
    .card { background: #13131a; border: 1px solid #2a2a3d; border-radius: 16px; padding: 40px;
            width: 100%; max-width: 380px; box-shadow: 0 8px 48px rgba(0,0,0,.6); }
    .logo { font-size: 24px; font-weight: 700; color: #818cf8; text-align: center; margin-bottom: 6px; }
    .subtitle { text-align: center; color: #6b7280; font-size: 13px; margin-bottom: 28px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #a5b4fc; margin-bottom: 4px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 10px 14px; border: 1.5px solid #2a2a3d;
      border-radius: 8px; font-size: 14px; outline: none; color: #e0e7ff;
      background: #0d0d14; transition: border-color .15s; margin-bottom: 16px; }
    input:focus { border-color: #6366f1; }
    button[type="submit"] {
      width: 100%; padding: 11px; background: #6366f1; color: white;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s; }
    button[type="submit"]:hover { background: #4f46e5; }
    .error { background: #2d1515; border: 1px solid #7f1d1d; color: #fca5a5;
             border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Quiribot ⚙</div>
    <div class="subtitle">Owner Control Panel</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST" action="/owner/login">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autocomplete="username" />
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" />
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
